<html>
<head>

<style>

    color: white;
    font-family: 'Courier New';

<body>

<audio id="bgMusic" loop>
    <source src="page4.mp3" type="audio/mpeg">
</audio>





<div>

<p style="opacity:0.3; font-size:12px;">
SYSTEM LOG: unauthorized presence detected...
</p>



<p style="opacity:0.25; font-size:12px;">
>> system restarting
</p>



    <p>
    No code to crack,<br>
    no key to find,<br>
    The answer you seek<br>
    has been there the whole time.<br><br>

    Not in the walls,<br>
    not in the game,<br>

    <button onclick="reveal()">Answer</button>
<p style="opacity:0.2; font-size:10px;">
you ready?....
</p>

<script>
function reveal() {
    let ans = prompt("Who am I?");

    if (!ans) return;

    let a = ans.toLowerCase();

    if (
        a.includes("kim") ||
        a.includes("yeonah") ||
        a.includes("kimmyneutron") ||
        a.includes("kimmy")
    ) {
        alert("Of course you solved it...\n\nIt was never a game.\nIt was always you.");

        setTimeout(() => {
            window.location.href = "lastpage.html";
        }, 1000);

    } else {
        alert("Wrong answer. Try again.");
    }
}
</script>

<p style="position: absolute; bottom: 10px; font-size: 10px; opacity: 0.2;">
archive status: hmmm...
</p>

<script>
document.addEventListener("click", () => {
    const music = document.getElementById("bgMusic");
    music.volume = 0.5;
    music.play();
}, { once: true });
</script>


</body>
